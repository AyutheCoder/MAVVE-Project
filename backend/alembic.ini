# Alembic Configuration File for MAVVE

[alembic]
# Path to migration environment
script_location = db/migrations

# Template used to generate migration files
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s

# Prepend sys.path — allows importing from project root
prepend_sys_path = .

# Timezone for revision timestamps
timezone = UTC

# SQLAlchemy URL — overridden at runtime by env.py
sqlalchemy.url = postgresql+asyncpg://mavve:mavve_secret@localhost:5432/mavve_db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
